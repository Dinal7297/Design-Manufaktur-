<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DESIGN MANUFAKTUR - Bengkel Las Profesional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        :root {
            --primary: #d4a843;
            --primary-dark: #b8922f;
            --dark: #1a1a2e;
            --darker: #0f0f1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--darker);
            color: #fff;
        }

        /* === Navbar === */
        .navbar {
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 10px 0;
            border-bottom: 1px solid rgba(212, 168, 67, 0.2);
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .navbar-brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .navbar-brand-logo img {
            height: 45px;
            width: auto;
            object-fit: contain;
        }

        .navbar-brand-text {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary) !important;
            letter-spacing: -0.5px;
        }

        .navbar-brand-text span {
            color: #fff;
        }

        .nav-link {
            color: #ccc !important;
            font-weight: 500;
            margin: 0 6px;
            padding: 8px 16px !important;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--primary) !important;
            background: rgba(212, 168, 67, 0.1);
        }

        .nav-link.active {
            color: var(--primary) !important;
            background: rgba(212, 168, 67, 0.15);
        }

        /* === Hero === */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 120px 0 80px;
            background: linear-gradient(135deg, var(--darker) 0%, #1a1a2e 50%, #2a1f0a 100%);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 168, 67, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.3;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(212, 168, 67, 0.15);
            color: var(--primary);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid rgba(212, 168, 67, 0.2);
            margin-bottom: 20px;
        }

        .hero h1 {
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero h1 .highlight {
            color: var(--primary);
            position: relative;
        }

        .hero h1 .highlight::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary);
            border-radius: 4px;
            opacity: 0.4;
        }

        .hero p {
            font-size: 1.2rem;
            color: #aaa;
            max-width: 540px;
            line-height: 1.8;
            margin-bottom: 32px;
        }

        .btn-primary-custom {
            background: var(--primary);
            color: var(--darker);
            border: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary-custom:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(212, 168, 67, 0.3);
            color: var(--darker);
        }

        .btn-outline-custom {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.15);
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-left: 12px;
        }

        .btn-outline-custom:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .hero-stats {
            display: flex;
            gap: 48px;
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .hero-stats .stat h3 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0;
        }

        .hero-stats .stat p {
            font-size: 0.85rem;
            color: #888;
            margin: 0;
        }

        /* === Layanan === */
        .services {
            padding: 100px 0;
            background: var(--dark);
        }

        .section-label {
            display: inline-block;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .section-subtitle {
            color: #999;
            max-width: 560px;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 40px 32px;
            transition: all 0.4s ease;
            height: 100%;
            text-align: center;
        }

        .service-card:hover {
            transform: translateY(-8px);
            border-color: rgba(212, 168, 67, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            background: rgba(212, 168, 67, 0.04);
        }

        .service-card .icon {
            width: 72px;
            height: 72px;
            background: rgba(212, 168, 67, 0.12);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: var(--primary);
            transition: all 0.3s ease;
        }

        .service-card:hover .icon {
            background: var(--primary);
            color: var(--darker);
            transform: scale(1.05);
        }

        .service-card h4 {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        .service-card p {
            color: #999;
            font-size: 0.95rem;
            line-height: 1.7;
            margin: 0;
        }

        /* === Portfolio / Galeri === */
        .gallery {
            padding: 100px 0;
            background: var(--darker);
        }

        .gallery-grid {
            margin-top: 40px;
        }

        .gallery-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s ease;
            aspect-ratio: 4 / 3;
            background: #151525;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 168, 67, 0.4);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-item-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 16px;
            background: linear-gradient(to top, rgba(15, 15, 26, 0.95) 20%, rgba(15, 15, 26, 0.4) 70%, transparent);
            color: #fff;
            transform: translateY(10px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .gallery-item:hover .gallery-item-info {
            transform: translateY(0);
            opacity: 1;
