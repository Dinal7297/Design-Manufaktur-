<!DOCTYPE html>
<html lang="id">
<head>

    <title>DESIGN MANUFAKTUR - Bengkel Las Profesional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        /* (CSS sama seperti sebelumnya, tidak diubah) */
        :root {
            --primary: #d4a843;
            --primary-dark: #b8922f;
            --dark: #1a1a2e;
            --darker: #0f0f1a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--darker);
            color: #fff;
        }
        /* ... semua CSS lainnya ... (sama persis) */
        /* Saya singkat di sini agar jawaban tidak terlalu panjang, tapi Anda bisa gunakan kode lengkap dari jawaban sebelumnya dan ganti bagian link */
    </style>
</head>
<body>
    <!-- Navbar, Hero, Services, Gallery, About, Contact, Footer - semua sama -->

    <!-- Bagian Gallery CTA yang diperbaiki -->
    <div class="gallery-cta">
        <div class="icon-big">
            <i class="fas fa-images"></i>
        </div>
        <h3>Lihat Portofolio Lengkap</h3>
        <p>
            Untuk melihat lebih banyak foto dan video hasil pekerjaan kami,
            kunjungi Google Maps atau TikTok kami. Kami selalu update dengan
            proyek-proyek terbaru!
        </p>
        <div class="divider">
            <span class="line"></span>
            <span><i class="fas fa-arrow-down" style="color:var(--primary);"></i></span>
            <span class="line"></span>
        </div>
        <div>
            <!-- PERBAIKAN LINK GOOGLE MAPS -->
            <a href="https://www.google.com/maps/place/DESIGN+MANUFAKTUR/@-6.5064563,106.8436531,17z" target="_blank" class="btn-link-custom">
                <i class="fas fa-map-pin"></i> Google Maps
            </a>
            <a href="https://www.tiktok.com/@dinalmubarok?_r=1&_t=ZS-97IEO0umexe" target="_blank" class="btn-link-custom">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>
        <p style="font-size:0.85rem; color:#777; margin-top:16px;">
            <i class="fas fa-info-circle me-1"></i>
            Klik tombol di atas untuk melihat foto dan video lebih lengkap
        </p>
    </div>

    <!-- Bagian kontak juga sudah pakai iframe yang benar, tidak perlu diubah -->

    <!-- Footer dan script -->
    <footer class="footer">...</footer>
